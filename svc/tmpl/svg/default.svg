<svg xmlns="http://www.w3.org/2000/svg" width="400" height="{{if .TopRepos}}200{{else}}120{{end}}">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2d3748"/>
      <stop offset="100%" style="stop-color:#4a5568"/>
    </linearGradient>
  </defs>
  <rect width="400" height="{{if .TopRepos}}200{{else}}120{{end}}" rx="12" fill="url(#bg)"/>

  <text x="30" y="40" font-size="28">🐙</text>
  <text x="70" y="32" fill="#a0aec0" font-size="14" font-family="Arial,sans-serif">
    {{.Username}}'s Pull Requests
  </text>
  <text x="70" y="55" fill="#ffffff" font-size="28" font-weight="bold" font-family="Arial,sans-serif">
    {{.TotalPRs}} PRs
  </text>
  <text x="70" y="74" fill="#68d391" font-size="13" font-family="Arial,sans-serif">
    across {{.TotalRepos}} repositories
  </text>

  {{if .TopRepos}}
  <!-- 分隔线 -->
  <line x1="20" y1="90" x2="380" y2="90" stroke="#4a5568" stroke-width="0.5"/>

  <!-- 仓库表头 -->
  <text x="30" y="112" fill="#a0aec0" font-size="11" font-family="Arial,sans-serif">Repository</text>
  <text x="340" y="112" fill="#a0aec0" font-size="11" font-family="Arial,sans-serif" text-anchor="end">⭐</text>

  <!-- 仓库列表 -->
  {{range $i, $r := .TopRepos}}
  <text x="30" y="{{add 132 (mul $i 22)}}" fill="#e2e8f0" font-size="12" font-family="Arial,sans-serif">{{$r.Name}}</text>
  <text x="340" y="{{add 132 (mul $i 22)}}" fill="#f6e05e" font-size="12" font-family="Arial,sans-serif" text-anchor="end">{{$r.Stars}}</text>
  {{end}}
  {{end}}
</svg>
