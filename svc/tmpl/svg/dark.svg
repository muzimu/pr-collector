<svg xmlns="http://www.w3.org/2000/svg" width="800" height="{{.Height}}" viewBox="0 0 800 {{.Height}}" role="img" aria-label="Pull Requests Stats">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <style>
      .bg { fill: url(#bg); }
      .border { fill: none; stroke: #30363d; stroke-width: 1; }
      .avatar-bg { fill: #21262d; }
      .text-primary { fill: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
      .text-muted { fill: #8b949e; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
      .text-accent { fill: #58a6ff; font-family: "Geist Mono", "SF Mono", Monaco, "Cascadia Code", "Roboto Mono", Consolas, "Courier New", monospace; }
      .text-success { fill: #3fb950; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
      .chip-border { fill: #21262d; stroke: #30363d; stroke-width: 1; }
      .bar { fill: #30363d; }
    </style>
  </defs>

  <!-- Card background -->
  <rect class="bg" x="0.5" y="0.5" width="799" height="{{sub .Height 1}}" rx="16" ry="16"/>
  <rect class="border" x="0.5" y="0.5" width="799" height="{{sub .Height 1}}" rx="16" ry="16"/>

  <!-- Avatar -->
  <circle class="avatar-bg" cx="72" cy="100" r="40"/>
  <text x="72" y="108" text-anchor="middle" font-size="36" dominant-baseline="middle">🐙</text>

  <!-- Title row -->
  <text x="136" y="62" class="text-muted" font-size="14">{{.Username}}'s Pull Requests</text>

  <!-- Big number -->
  <text x="136" y="114" class="text-primary" font-size="48" font-weight="700" font-family='"Geist Mono", "SF Mono", Monaco, "Cascadia Code", "Roboto Mono", Consolas, "Courier New", monospace'>{{.TotalPRs}} PRs</text>

  <!-- Subtitle -->
  <text x="136" y="142" class="text-success" font-size="14">across {{.TotalRepos}} repositories</text>

  <!-- Repo chips -->
  {{if .TopRepos}}
  {{range $i, $r := .TopRepos}}
  <g transform="translate({{add 136 $r.Offset}}, {{add 156 (mul $r.Row 28)}})">
    <rect x="0" y="0" width="{{$r.Width}}" height="22" rx="11" class="chip-border"/>
    <circle cx="12" cy="11" r="4" fill="{{repoColor $i}}"/>
    <text x="22" y="15" class="text-muted" font-size="12" font-family='"Geist Mono", "SF Mono", Monaco, "Cascadia Code", "Roboto Mono", Consolas, "Courier New", monospace'>{{$r.Name}}</text>
    <text x="{{$r.StarsX}}" y="15" class="text-muted" font-size="12" font-family='"Geist Mono", "SF Mono", Monaco, "Cascadia Code", "Roboto Mono", Consolas, "Courier New", monospace'>★ {{$r.StarsText}}</text>
  </g>
  {{end}}
  {{end}}

  <!-- Right column: trend score + mini bars -->
  <g transform="translate(660, 70)">
    <text x="0" y="0" class="text-muted" font-size="12" text-anchor="end">Trend Score</text>
    <text x="0" y="36" class="text-accent" font-size="28" font-weight="700" text-anchor="end">{{printf "%.1f" .Score}}</text>
    <g transform="translate(-98, 50)">
      <rect x="0" y="20" width="6" height="12" rx="3" class="bar"/>
      <rect x="10" y="12" width="6" height="20" rx="3" class="bar"/>
      <rect x="20" y="16" width="6" height="16" rx="3" class="bar"/>
      <rect x="30" y="4" width="6" height="28" rx="3" class="bar"/>
      <rect x="40" y="10" width="6" height="22" rx="3" class="bar"/>
      <rect x="50" y="14" width="6" height="18" rx="3" class="bar"/>
      <rect x="60" y="8" width="6" height="24" rx="3" class="bar"/>
    </g>
  </g>
</svg>
