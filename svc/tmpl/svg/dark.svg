<svg xmlns="http://www.w3.org/2000/svg" width="400" height="{{.Height}}">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>
  <rect width="400" height="{{.Height}}" rx="12" fill="url(#bg)"/>

  <text x="30" y="40" font-size="28">🐙</text>
  <text x="70" y="32" fill="#8b949e" font-size="14" font-family="Arial,sans-serif">
    {{.Username}}'s Pull Requests
  </text>
  <text x="70" y="55" fill="#58a6ff" font-size="28" font-weight="bold" font-family="Arial,sans-serif">
    {{.TotalPRs}} PRs
  </text>
  <text x="70" y="74" fill="#3fb950" font-size="13" font-family="Arial,sans-serif">
    across {{.TotalRepos}} repositories
  </text>

  {{if .TopRepos}}
  <line x1="20" y1="90" x2="380" y2="90" stroke="#30363d" stroke-width="0.5"/>

  <text x="30" y="112" fill="#8b949e" font-size="11" font-family="Arial,sans-serif">Repository</text>
  <text x="340" y="112" fill="#8b949e" font-size="11" font-family="Arial,sans-serif" text-anchor="end">⭐</text>

  {{range $i, $r := .TopRepos}}
  <text x="30" y="{{add 132 (mul $i 22)}}" fill="#c9d1d9" font-size="12" font-family="Arial,sans-serif">{{$r.Name}}</text>
  <text x="340" y="{{add 132 (mul $i 22)}}" fill="#d29922" font-size="12" font-family="Arial,sans-serif" text-anchor="end">{{$r.Stars}}</text>
  {{end}}
  {{end}}
</svg>
