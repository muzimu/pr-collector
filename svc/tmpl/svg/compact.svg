<svg xmlns="http://www.w3.org/2000/svg" width="300" height="60">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#24292e"/>
      <stop offset="100%" style="stop-color:#2f363d"/>
    </linearGradient>
  </defs>
  <rect width="300" height="60" rx="8" fill="url(#bg)"/>
  <text x="15" y="30" font-size="16">🐙</text>
  <text x="40" y="25" fill="#959da5" font-size="11" font-family="Arial,sans-serif">
    {{.Username}}
  </text>
  <text x="40" y="45" fill="#ffffff" font-size="18" font-weight="bold" font-family="Arial,sans-serif">
    {{.TotalPRs}} PRs · {{.TotalRepos}} repos
  </text>
</svg>
