<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Username}} - PR Contributions</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 900px; margin: 40px auto; padding: 0 20px;
      background: #f6f8fa; color: #24292e;
    }
    h1 { font-size: 28px; margin-bottom: 4px; }
    .summary { color: #57606a; margin-bottom: 16px; font-size: 14px; }
    .refresh-btn {
      display: inline-block; padding: 8px 16px;
      background: #2da44e; color: #fff; border: none;
      border-radius: 6px; cursor: pointer; font-size: 14px;
      margin-bottom: 24px; text-decoration: none;
    }
    .refresh-btn:hover { background: #2c974b; }
    table {
      width: 100%; border-collapse: collapse;
      background: #fff; border: 1px solid #d0d7de; border-radius: 8px;
      overflow: hidden;
    }
    th, td { padding: 12px 16px; text-align: left; }
    th { background: #f6f8fa; font-weight: 600; font-size: 13px;
         color: #656d76; border-bottom: 1px solid #d0d7de; }
    td { border-bottom: 1px solid #d0d7de; font-size: 14px; }
    tr:last-child td { border-bottom: none; }
    .col-index { width: 40px; text-align: center; color: #656d76; }
    .col-stars { width: 70px; text-align: right; }
    .col-pr { }
    a { color: #0969da; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .pr-link {
      display: inline-block; margin: 1px 4px 1px 0;
      font-size: 13px; color: #656d76;
    }
    .pr-link a { color: #0969da; }
    .empty-state { text-align: center; padding: 60px 0; color: #656d76; }
  </style>
</head>
<body>
  <h1>🐙 {{.Username}}'s Pull Requests</h1>

  {{if .Groups}}
    <p class="summary">{{.TotalPRs}} 个 PR · {{.TotalRepos}} 个仓库</p>

    <form action="/refresh" method="post" style="display:inline;">
      <input type="hidden" name="username" value="{{.Username}}">
      <button type="submit" class="refresh-btn">🔄 刷新数据</button>
    </form>

    <table>
      <thead>
        <tr>
          <th class="col-index">#</th>
          <th>仓库</th>
          <th class="col-stars">Stars</th>
          <th>Pull Requests</th>
        </tr>
      </thead>
      <tbody>
        {{range $i, $g := .Groups}}
        <tr>
          <td class="col-index">{{add $i 1}}</td>
          <td><a href="{{$g.RepoURL}}" target="_blank" rel="noopener">{{$g.Repo}}</a></td>
          <td class="col-stars">{{$g.Stars}}</td>
          <td>
            {{range $g.PRs}}
            <span class="pr-link">
              <a href="{{.URL}}" target="_blank" rel="noopener" title="{{.Title}}">#{{.Number}}</a>
            </span>
            {{end}}
          </td>
        </tr>
        {{end}}
      </tbody>
    </table>
  {{else}}
    <div class="empty-state">
      <h2>暂无 PR 数据</h2>
      <p style="margin-top:8px;">该用户还没有已合并的 Pull Request</p>
    </div>
  {{end}}
</body>
</html>
