<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>出错了 - PR Collector</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  {{template "htmx_head" .}}
</head>
<body class="feedback-document">
  {{template "error_content" .}}
</body>
</html>

{{define "error_content"}}
<header class="feedback-page-header">
  <div class="feedback-page-header-inner">
    <a href="/" class="feedback-page-logo">🏆 PR Collector</a>
    <a href="/" class="feedback-page-nav">排行榜</a>
  </div>
</header>

<main class="feedback-page-main">
  <div class="feedback-card">
    <div class="feedback-icon">⚠️</div>
    <h1>页面出错了</h1>
    <div class="feedback-error-message">{{.message}}</div>
    <p>请稍后重试，或返回排行榜查看其他内容</p>
    <div class="feedback-actions">
      <a href="/" class="feedback-button feedback-button-primary">返回排行榜</a>
      <button type="button" onclick="history.back()" class="feedback-button feedback-button-outline">返回上一页</button>
    </div>
  </div>
</main>
{{end}}

{{define "error_fragment"}}
<title>出错了 - PR Collector</title>
{{template "error_content" .}}
{{end}}
