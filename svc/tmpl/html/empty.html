<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>暂无数据 - PR Collector</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --text-primary: #1e293b;
      --text-secondary: #52525b;
      --text-tertiary: #71717b;
      --accent: #ea580c;
      --accent-hover: #c2410c;
      --border: #e2e8f0;
      --bg-secondary: #f6f8fb;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a { text-decoration: none; color: inherit; }

    .header {
      height: 64px;
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      height: 100%;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .nav-item {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      padding: 10px 20px;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .btn-outline {
      background: #fff;
      color: var(--text-primary);
      border: 1px solid var(--border);
      padding: 10px 20px;
    }

    .btn-outline:hover {
      background: var(--bg-secondary);
    }

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 48px;
      text-align: center;
      max-width: 480px;
      width: 100%;
    }

    .icon {
      font-size: 56px;
      line-height: 1;
      margin-bottom: 16px;
    }

    .card h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .card p {
      font-size: 15px;
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    @media (max-width: 640px) {
      .card {
        padding: 36px 24px;
      }

      .actions {
        flex-direction: column;
      }

      .actions .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="/" class="logo">🏆 PR Collector</a>
      <a href="/" class="nav-item">排行榜</a>
    </div>
  </header>

  <main class="main">
    <div class="card">
      <div class="icon">🐙</div>
      <h1>暂无 {{.Username}} 的 PR 数据</h1>
      <p>请稍后刷新页面查看，或返回排行榜浏览其他开发者</p>
      <div class="actions">
        <a href="/" class="btn btn-primary">返回排行榜</a>
      </div>
    </div>
  </main>
</body>
</html>
